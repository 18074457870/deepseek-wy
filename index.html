<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek助手</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f0f2f5;
    font-family:"微软雅黑";
}

.box{
    max-width:900px;
    margin:0 auto;
    padding:20px;
}

h2{
    text-align:center;
    color:#1677ff;
    margin-bottom:20px;
}

#chat{
    height:65vh;
    background:#fff;
    border-radius:12px;
    padding:15px;
    overflow-y:auto;
    margin-bottom:15px;

    display:flex;
    flex-direction:column;
}

.input-area{
    display:flex;
    gap:10px;
}

#user-input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    font-size:15px;
    resize:none;
    min-height:50px;
    font-family:"微软雅黑";
}

#btn{
    padding:12px 25px;
    background:#1677ff;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

#btn:hover{
    background:#0958d9;
}

.user-message{
    background:#1677ff;
    color:white;
    padding:14px 18px;
    border-radius:18px;
    max-width:75%;
    margin:12px 0 12px auto;
    line-height:1.7;
    word-break:break-word;
}

.bot-message{
    background:#f1f1f1;
    color:#333;
    padding:14px 18px;
    border-radius:18px;
    max-width:75%;
    margin:12px 0;
    line-height:1.7;
    word-break:break-word;
}

.bot-message pre{
    margin:0;
    white-space:pre-wrap;
    word-break:break-word;
    font-size:16px;
    line-height:1.7;
    font-family:"微软雅黑";
}

.loading{
    opacity:0.7;
}

</style>

</head>

<body>

<div class="box">

    <h2>DeepSeek助手</h2>

    <div id="chat"></div>

    <div class="input-area">

        <textarea
            id="user-input"
            placeholder="输入问题，Enter发送，Shift+Enter换行"
            onkeydown="handleKey(event)"
        ></textarea>

        <button id="btn">发送</button>

    </div>

</div>

<script>

const chat = document.getElementById('chat');
const input = document.getElementById('user-input');
const btn = document.getElementById('btn');

const API_KEY = "sk-b291304252414f52a0b0a1a74c017f5e";
const URL = "https://api.deepseek.com/v1/chat/completions";

function addUserMessage(content){

    chat.innerHTML += `
        <div class="user-message">
            ${content}
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

function addBotMessage(content){

    chat.innerHTML += `
        <div class="bot-message">
            <pre>${content}</pre>
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    const msg = input.value.trim();

    if(!msg) return;

    addUserMessage(msg);

    input.value = "";

    chat.innerHTML += `
        <div class="bot-message loading" id="loading">
            正在思考中...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try{

        const response = await fetch(URL,{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + APIKEY
            },

            body:JSON.stringify({

                model:"deepseek-chat",

                messages:[
                    {
                        role:"user",
                        content:msg
                    }
                ]

            })

        });

        const data = await response.json();

        document.getElementById("loading").remove();

        const reply =
        data.choices?.[0]?.message?.content || "AI没有返回内容";

        addBotMessage(reply);

    }catch(error){

        document.getElementById("loading").remove();

        addBotMessage("出错了：" + error.message);

        console.error(error);

    }

}

function handleKey(event){

    if(event.key === "Enter" && !event.shiftKey){

        event.preventDefault();

        sendMessage();

    }

}

btn.onclick = sendMessage;

</script>

</body>
</html>
